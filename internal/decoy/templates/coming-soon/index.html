<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Coming Soon</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a; color: #e2e8f0; text-align: center; padding: 24px;
    }
    .card { max-width: 560px; }
    h1 { font-size: clamp(2rem, 6vw, 3.25rem); margin: 0 0 .5rem; font-weight: 700; letter-spacing: -.02em; }
    p { font-size: 1.05rem; line-height: 1.6; color: #94a3b8; margin: 0 0 1.75rem; }
    .dot { display:inline-block; width:10px; height:10px; border-radius:50%; background:#38bdf8; margin-right:8px; vertical-align:middle; }
    form { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
    input[type=email] {
      padding: 12px 14px; border-radius: 10px; border: 1px solid #334155; background: #1e293b;
      color: #e2e8f0; font-size: 1rem; min-width: 240px;
    }
    button {
      padding: 12px 20px; border-radius: 10px; border: 0; background: #38bdf8; color: #0f172a;
      font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    footer { margin-top: 2.5rem; font-size: .85rem; color: #475569; }
  </style>
</head>
<body>
  <main class="card">
    <h1><span class="dot"></span>We're launching soon</h1>
    <p>Our new website is on its way. Leave your email and we'll let you know the moment it goes live.</p>
    <form onsubmit="return false;">
      <input type="email" placeholder="you@example.com" aria-label="Email address" required>
      <button type="submit">Notify me</button>
    </form>
    <footer>&copy; 2026 &middot; All rights reserved.</footer>
  </main>
</body>
</html>
